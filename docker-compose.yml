services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/lovecheck}
      UPLOAD_DIR: /app/uploads
    expose:
      - "4000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy

  pwa:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.lovestory.babyress.games/api}
        VITE_PUSH_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.lovestory.babyress.games/api}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api

volumes:
  mongo_data:
  uploads:
